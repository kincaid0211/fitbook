<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>非书</title>
    <style>:root {
  color-scheme: light;
  --ink: #111a33;
  --muted: #667085;
  --subtle: #8a98ad;
  --line: #dce7f7;
  --soft-line: #edf3fb;
  --paper: #f5f9ff;
  --panel: #ffffff;
  --blue: #0066ff;
  --blue-dark: #004dd6;
  --blue-soft: #eaf3ff;
  --cyan: #2cc8ff;
  --orange: #f08a4b;
  --gold: #f4b83f;
  --violet: #6d63ff;
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 18% 14%, rgba(0, 102, 255, 0.11), transparent 32%),
    linear-gradient(180deg, #f7fbff 0%, #eef6ff 48%, #f8fbff 100%);
  color: var(--ink);
}

button,
input,
textarea {
  font: inherit;
}

button {
  min-height: 44px;
  border: 0;
  border-radius: 8px;
  background: var(--blue);
  color: #fff;
  cursor: pointer;
  font-weight: 800;
  transition:
    transform 160ms ease,
    box-shadow 160ms ease,
    background 160ms ease;
}

button:hover {
  background: var(--blue-dark);
  box-shadow: 0 14px 30px rgba(0, 102, 255, 0.18);
  transform: translateY(-1px);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.62;
  transform: none;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 18px;
  color: var(--ink);
  font-size: clamp(44px, 7.5vw, 86px);
  line-height: 1.02;
  letter-spacing: 0;
}

h2 {
  margin-bottom: 12px;
  font-size: clamp(26px, 3vw, 38px);
  line-height: 1.18;
  letter-spacing: 0;
}

h3 {
  margin-bottom: 8px;
  font-size: 20px;
  line-height: 1.28;
}

.screen {
  width: min(1360px, calc(100vw - 40px));
  margin: 0 auto;
  padding: 22px 0 56px;
}

.topbar {
  position: sticky;
  top: 12px;
  z-index: 5;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 20px;
  min-height: 74px;
  border: 1px solid rgba(210, 224, 244, 0.92);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.92);
  padding: 12px 16px;
  box-shadow: 0 20px 50px rgba(17, 49, 96, 0.08);
  backdrop-filter: blur(16px);
}

.brand-button,
.nav-links button {
  border: 0;
  background: transparent;
  color: var(--ink);
}

.brand-button {
  display: inline-flex;
  align-items: center;
  justify-self: start;
  gap: 18px;
  min-height: 0;
  padding: 0;
  font-weight: 700;
}

.brand-button:hover,
.nav-links button:hover {
  background: transparent;
  box-shadow: none;
  color: var(--blue);
  transform: none;
}

.brand-logo {
  display: block;
  width: clamp(112px, 12vw, 160px);
  height: auto;
}

.brand-button span {
  color: var(--muted);
  font-size: 14px;
}

.nav-links {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
}

.nav-links button {
  position: relative;
  min-height: 42px;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 16px;
  font-weight: 800;
}

.nav-links button.active {
  color: var(--blue);
}

.nav-links button.active::after {
  position: absolute;
  right: 10px;
  bottom: 2px;
  left: 10px;
  height: 3px;
  border-radius: 999px;
  background: var(--blue);
  content: "";
}

.nav-cta {
  justify-self: end;
  padding: 0 18px;
}

.eyebrow {
  margin: 0 0 10px;
  color: var(--blue);
  font-size: 14px;
  font-weight: 900;
}

.lead {
  max-width: 760px;
  color: var(--muted);
  font-size: clamp(18px, 2vw, 24px);
  line-height: 1.62;
}

.hero-shell {
  position: relative;
  overflow: hidden;
  margin-top: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.98) 0%, rgba(247, 251, 255, 0.92) 58%, rgba(231, 243, 255, 0.86) 100%),
    radial-gradient(circle at 70% 70%, rgba(0, 102, 255, 0.12), transparent 34%);
  box-shadow: 0 22px 60px rgba(20, 67, 128, 0.1);
}

.landing-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(390px, 470px);
  gap: 34px;
  align-items: center;
  padding: clamp(42px, 7vw, 88px);
}

.hero-copy {
  position: relative;
  z-index: 1;
}

.hero-actions,
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 28px;
}

.hero-actions button,
.actions button {
  padding: 0 22px;
  font-size: 16px;
}

.ghost-button {
  border: 1px solid #b9d3ff;
  background: #fff;
  color: var(--blue);
}

.ghost-button:hover {
  background: var(--blue-soft);
  color: var(--blue-dark);
}

.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 42px;
  color: var(--muted);
  font-weight: 700;
}

.hero-meta span {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.hero-meta span::before {
  width: 18px;
  height: 18px;
  border: 2px solid var(--blue);
  border-radius: 6px;
  background: #fff;
  content: "";
}

.hero-book-preview {
  display: grid;
  grid-template-columns: minmax(220px, 1fr) 172px;
  gap: 22px;
  align-items: center;
}

.stat-stack {
  display: grid;
  gap: 14px;
}

.stat-stack span {
  min-height: 78px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--soft-line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.92);
  padding: 14px 16px;
  color: var(--ink);
  font-size: 17px;
  font-weight: 800;
  box-shadow: 0 16px 34px rgba(20, 67, 128, 0.08);
}

.stat-stack strong {
  color: var(--blue);
  font-size: 30px;
}

.section-block {
  margin-top: 28px;
}

.section-heading {
  margin-bottom: 18px;
}

.section-heading.row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 18px;
}

.section-heading h2 {
  margin-bottom: 0;
}

.compact-heading {
  align-items: center;
}

.soft-note {
  color: var(--subtle);
  font-size: 14px;
  font-weight: 700;
}

.feature-grid,
.flow-grid,
.shelf-grid {
  display: grid;
  gap: 18px;
}

.feature-grid {
  grid-template-columns: repeat(3, 1fr);
}

.feature-grid article,
.flow-grid article,
.start-panel,
.reading-card,
.side-panel,
.preface,
.toc,
.authors-panel,
.route-timeline,
.empty-state {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: 0 18px 45px rgba(20, 67, 128, 0.07);
}

.feature-grid article {
  min-height: 180px;
  padding: 26px;
}

.feature-icon {
  display: inline-grid;
  width: 50px;
  height: 50px;
  place-items: center;
  margin-bottom: 24px;
  border-radius: 8px;
  background: var(--blue-soft);
  color: var(--blue);
  font-weight: 900;
}

.feature-grid strong,
.flow-grid strong {
  display: block;
  margin-bottom: 10px;
  font-size: 22px;
}

.feature-grid p,
.flow-grid p,
.reading-card p,
.side-panel p,
.preface p,
.authors-panel p {
  color: var(--muted);
  line-height: 1.7;
}

.flow-grid {
  grid-template-columns: repeat(4, 1fr);
}

.flow-grid article {
  min-height: 178px;
  padding: 22px;
}

.flow-grid span {
  display: inline-grid;
  width: 36px;
  height: 36px;
  place-items: center;
  margin-bottom: 20px;
  border-radius: 999px;
  background: var(--blue);
  color: #fff;
  font-weight: 900;
}

.shelf-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.shelf-card {
  display: grid;
  grid-template-columns: 148px minmax(0, 1fr);
  gap: 22px;
  align-items: center;
  min-height: 250px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.96);
  padding: 18px;
  box-shadow: 0 16px 42px rgba(20, 67, 128, 0.08);
  cursor: pointer;
  transition:
    transform 160ms ease,
    border-color 160ms ease,
    box-shadow 160ms ease;
}

.shelf-card:hover {
  border-color: #9bc5ff;
  box-shadow: 0 24px 54px rgba(0, 102, 255, 0.12);
  transform: translateY(-2px);
}

.shelf-copy {
  min-width: 0;
}

.card-kicker {
  display: inline-flex;
  margin-bottom: 8px;
  border-radius: 999px;
  background: var(--blue-soft);
  padding: 5px 9px;
  color: var(--blue);
  font-size: 12px;
  font-weight: 900;
}

.shelf-card h3 {
  margin-bottom: 8px;
}

.shelf-card p {
  margin-bottom: 10px;
  color: var(--muted);
  line-height: 1.55;
}

.mini-cover {
  position: relative;
  overflow: hidden;
  aspect-ratio: 3 / 4;
  width: 100%;
  border: 1px solid rgba(0, 70, 160, 0.24);
  border-radius: 8px;
  background:
    linear-gradient(160deg, rgba(255, 255, 255, 0.95), rgba(230, 241, 255, 0.72)),
    linear-gradient(140deg, #ffffff, #eaf3ff);
  box-shadow:
    inset 8px 0 0 rgba(0, 67, 160, 0.1),
    0 18px 32px rgba(17, 49, 96, 0.14);
  color: var(--ink);
}

.mini-cover.large {
  max-width: 320px;
  min-width: 250px;
  justify-self: center;
}

.cover-brand {
  position: absolute;
  left: 14px;
  bottom: 12px;
  z-index: 2;
  color: var(--blue);
  font-size: 13px;
  font-weight: 900;
}

.cover-title {
  position: absolute;
  top: 20px;
  left: 18px;
  right: 18px;
  z-index: 2;
  color: var(--ink);
  font-size: clamp(18px, 2vw, 32px);
  font-weight: 900;
  line-height: 1.25;
}

.mini-cover:not(.large) .cover-title {
  font-size: 18px;
}

.cover-lines {
  position: absolute;
  right: -20%;
  bottom: 18%;
  width: 120%;
  height: 34%;
  border-top: 4px solid rgba(0, 102, 255, 0.22);
  border-bottom: 4px solid rgba(0, 102, 255, 0.18);
  border-radius: 50%;
  transform: rotate(-10deg);
}

.cover-art {
  position: absolute;
  right: 14px;
  bottom: 42px;
  left: 18px;
  height: 44%;
}

.cover-art span {
  position: absolute;
  border-radius: 999px;
  background: var(--blue);
}

.cover-art span:nth-child(1) {
  width: 46%;
  height: 46%;
  left: 4%;
  bottom: 8%;
  border: 2px solid rgba(255, 255, 255, 0.7);
  background: linear-gradient(160deg, #004fbf, #0a8bff);
}

.cover-art span:nth-child(2) {
  width: 14px;
  height: 14px;
  left: 58%;
  bottom: 52%;
}

.cover-art span:nth-child(3) {
  width: 10px;
  height: 10px;
  left: 76%;
  bottom: 72%;
  background: var(--cyan);
}

.cover-art span:nth-child(4) {
  width: 22px;
  height: 22px;
  left: 68%;
  bottom: 22%;
  background: var(--gold);
}

.cover-cocoon {
  background: linear-gradient(160deg, #ffffff, #e7f5f1);
}

.cover-cocoon .cover-art span:nth-child(1) {
  border-radius: 8px;
  background: linear-gradient(160deg, #0a8b86, #c8f0df);
}

.cover-public {
  background: linear-gradient(160deg, #fff9f5, #ffe8d9);
}

.cover-public .cover-art span {
  background: var(--orange);
}

.cover-writer {
  background: linear-gradient(160deg, #fffdf5, #fff0c8);
}

.cover-writer .cover-art span {
  background: var(--gold);
}

.cover-hot {
  background: linear-gradient(160deg, #fff, #eeeaff);
}

.cover-hot .cover-art span {
  background: var(--violet);
}

.cover-classic {
  background: linear-gradient(160deg, #ffffff, #e2f6ff);
}

.cover-classic .cover-art span {
  background: #008bc7;
}

.avatar-group {
  display: flex;
  align-items: center;
  min-height: 30px;
  margin: 10px 0;
}

.avatar-group span,
.avatar-group em,
.author-item > span {
  display: inline-grid;
  width: 30px;
  height: 30px;
  place-items: center;
  margin-left: calc(var(--i, 0) * -5px);
  border: 2px solid #fff;
  border-radius: 999px;
  background: linear-gradient(160deg, #d8eaff, #fff);
  color: var(--blue);
  font-size: 12px;
  font-style: normal;
  font-weight: 900;
  box-shadow: 0 6px 14px rgba(17, 49, 96, 0.1);
}

.avatar-group span:first-child {
  margin-left: 0;
}

.avatar-group em {
  background: #f1f5fb;
  color: var(--muted);
}

.book-card-footer,
.book-stats,
.detail-stats,
.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.book-card-footer span,
.book-stats span {
  border-radius: 999px;
  background: #f3f8ff;
  color: var(--muted);
  padding: 6px 10px;
  font-size: 13px;
  font-weight: 800;
}

.tag-row {
  margin: 16px 0;
}

.tag-row.compact {
  margin: 8px 0;
}

.tag-row span {
  border: 1px solid #b9d3ff;
  border-radius: 999px;
  background: #f2f7ff;
  color: var(--blue);
  padding: 6px 10px;
  font-size: 13px;
  font-weight: 800;
}

.page-heading {
  padding: 54px 0 18px;
}

.page-heading h1,
.compact-hero h1 {
  font-size: clamp(38px, 5.2vw, 64px);
}

.empty-state {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  gap: 46px;
  align-items: center;
  min-height: 280px;
  padding: 38px 62px;
}

.empty-state .mini-cover {
  max-width: 190px;
}

.empty-state p {
  color: var(--muted);
  font-size: 18px;
  line-height: 1.6;
}

.empty-state button {
  margin-top: 16px;
  padding: 0 22px;
}

.start-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(360px, 520px);
  gap: 26px;
  align-items: end;
  padding-top: 46px;
}

.compact-hero {
  padding: 22px 0;
}

.start-panel {
  padding: 24px;
}

.start-panel label {
  display: block;
  margin-bottom: 12px;
  font-size: 18px;
  font-weight: 900;
}

.paste-block {
  margin-top: 18px;
}

.paste-block label {
  color: var(--muted);
  font-size: 15px;
}

.start-ai-notes {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.start-ai-notes span {
  border-radius: 999px;
  background: #f3f8ff;
  color: var(--muted);
  padding: 7px 10px;
  font-size: 13px;
  font-weight: 800;
}

.input-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
}

input,
textarea {
  width: 100%;
  min-width: 0;
  border: 1px solid #bdd6ff;
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  padding: 14px 16px;
  outline: 0;
}

textarea {
  min-height: 118px;
  resize: vertical;
  line-height: 1.65;
}

input:focus,
textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.12);
}

.input-row button {
  padding: 0 22px;
}

.hint {
  margin: 12px 0 0;
  color: var(--muted);
}

.hint.good {
  color: var(--blue);
  font-weight: 800;
}

.status-message,
.error-message {
  margin: 12px 0 0;
  border-radius: 8px;
  padding: 10px 12px;
  font-weight: 800;
}

.status-message,
.status-banner {
  border: 1px solid #cfe2ff;
  background: #f5f9ff;
  color: var(--blue);
}

.error-message,
.error-banner {
  border: 1px solid #ffd4c7;
  background: #fff7f4;
  color: #bf3d1f;
}

.status-banner,
.error-banner {
  margin-bottom: 16px;
  border-radius: 8px;
  padding: 12px 14px;
  font-weight: 800;
}

.demo-route-button {
  width: 100%;
  margin-top: 16px;
}

.app-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  padding: 38px 0 16px;
}

.header-actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 10px;
}

.app-header h1 {
  max-width: 850px;
  font-size: clamp(30px, 4.5vw, 56px);
}

.progress-panel {
  display: grid;
  gap: 12px;
  margin-bottom: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.94);
  padding: 16px 18px;
}

.progress-copy {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.progress-copy span {
  color: var(--muted);
  font-size: 14px;
}

.progress-track {
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: #e3efff;
}

.progress-track div {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  transition: width 180ms ease;
}

.layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 380px;
  gap: 18px;
}

.reading-card,
.side-panel,
.preface,
.toc,
.authors-panel,
.route-timeline {
  padding: 24px;
}

.article-meta {
  margin-bottom: 14px;
  color: var(--muted);
  font-weight: 800;
}

.bridge {
  border: 1px solid #cfe2ff;
  border-left: 4px solid var(--blue);
  border-radius: 8px;
  background: #f5f9ff;
  padding: 16px;
}

.bridge p,
.curator-note p,
.interest-panel p,
.cover-concept-panel p {
  margin: 8px 0 0;
}

.curator-note,
.interest-panel,
.cover-concept-panel {
  margin-top: 16px;
  border: 1px solid var(--soft-line);
  border-radius: 8px;
  background: #fbfdff;
  padding: 16px;
}

.curator-note strong,
.interest-panel strong {
  color: var(--ink);
}

.direction-list {
  display: grid;
  gap: 10px;
}

.direction {
  width: 100%;
  min-height: 78px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  padding: 14px;
  text-align: left;
}

.direction:hover,
.direction.selected {
  border-color: var(--blue);
  background: var(--blue-soft);
}

.direction span {
  display: block;
  margin-bottom: 6px;
  color: var(--blue);
  font-weight: 900;
}

.candidate {
  margin-top: 16px;
  border: 1px solid #cfe2ff;
  border-radius: 8px;
  background: #f5f9ff;
  padding: 16px;
}

.candidate button,
.primary-wide {
  width: 100%;
  padding: 0 16px;
}

.candidate-list {
  display: grid;
  gap: 10px;
  margin-top: 16px;
}

.candidate-card {
  display: grid;
  gap: 6px;
  width: 100%;
  min-height: 0;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  padding: 14px;
  text-align: left;
}

.candidate-card:hover,
.candidate-card.selected {
  border-color: var(--blue);
  background: var(--blue-soft);
  box-shadow: 0 10px 24px rgba(0, 102, 255, 0.1);
}

.candidate-card span {
  color: var(--blue);
  font-size: 13px;
  font-weight: 900;
}

.candidate-card strong {
  line-height: 1.35;
}

.candidate-card small,
.candidate-card em {
  color: var(--muted);
  font-size: 13px;
  font-style: normal;
  line-height: 1.55;
}

.muted {
  color: var(--muted);
}

.route-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-top: 18px;
}

.route-node {
  min-height: 112px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.86);
  padding: 12px;
}

.route-node.active {
  border-color: var(--blue);
  background: var(--blue-soft);
}

.route-node span,

  place-items: center;
  border-radius: 999px;
  background: var(--blue);
  color: #fff;
  font-size: 13px;
  font-weight: 900;
}

.route-node p {

  font-size: 13px;

.chapter-status {

  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.94);

}

  gap: 8px;

  gap: 7px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  padding: 8px 12px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 850;

.chapter-marks span::before {

  height: 8px;

.book-pending {

  line-height: 1.45;

  line-height: 1.55;

  backdrop-filter: blur(6px);

function uniqueAuthors(steps) {
  return [...new Set(steps.map((step) => step.author))];
}

function authorCount(book) {
  return book.authorCount || uniqueAuthors(book.steps).length;
}

function conceptCount(book) {
  return new Set(book.steps.flatMap((step) => step.concepts || [])).size;
}

async function apiPost(path, payload) {
  const response = await fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      ...payload,
      aiConfig: readAiConfig(),
    }),
  });
  const data = await response.json().catch(() => null);
  if (!response.ok || !data?.ok) {
    throw new Error(data?.message || "请求失败，请稍后重试。");
  }
  return data;
}

function readAiConfig() {
  try {
    return JSON.parse(localStorage.getItem(aiConfigStorageKey) || "{}");
  } catch {
    return {};
  }
}

async function fetchHotList(refresh = false) {
  if (state.hotListLoading) return;
  state.hotListLoading = true;
  state.hotListError = "";
  render();

  try {
    const url = refresh ? "/api/hotlist?refresh=1" : "/api/hotlist";
    const response = await fetch(url);
    const data = await response.json().catch(() => null);
    if (!response.ok || !data?.ok) {
      throw new Error(data?.message || "获取热榜失败。");
    }
    state.hotList = (data.items || []).length ? data.items : state.hotList;
    state.hotListLoading = false;
  } catch (error) {
    state.hotListError = error.message || "获取热榜失败。";
    state.hotListLoading = false;
  }
  render();
}

function setBusy(message) {
  if (loadingTimer) clearInterval(loadingTimer);
  state.loading = message;
  state.loadingStartedAt = Date.now();
  state.error = "";
  render();
  loadingTimer = setInterval(() => {
    if (!state.loading) {
      clearInterval(loadingTimer);
      loadingTimer = null;
      return;
    }
    render();
  }, 1000);
}

function setError(error) {
  if (loadingTimer) clearInterval(loadingTimer);
  loadingTimer = null;
  state.loading = "";
  state.loadingStartedAt = null;
  state.error = error.message || "请求失败，请稍后重试。";
  render();
}

function clearBusy() {
  if (loadingTimer) clearInterval(loadingTimer);
  loadingTimer = null;
  state.loading = "";
  state.loadingStartedAt = null;
}

function loadingText() {
  if (!state.loading) return "";
  const seconds = state.loadingStartedAt ? Math.max(1, Math.round((Date.now() - state.loadingStartedAt) / 1000)) : 0;
  const suffix = seconds >= 8 ? ` 已等待 ${seconds} 秒，复杂节点可能需要更久。` : "";
  return `${state.loading}${suffix}`;
}

function parseZhihuUrl(input) {
  try {
    const url = new URL(input);
    const host = url.hostname.toLowerCase();
    const path = url.pathname;

    if (host === "zhuanlan.zhihu.com" && /^\/p\/[^/]+/.test(path)) return "知乎文章";
    if ((host === "www.zhihu.com" || host === "zhihu.com") && /^\/question\/[^/]+\/answer\/[^/]+/.test(path)) return "知乎回答";
    if ((host === "www.zhihu.com" || host === "zhihu.com") && /^\/question\/[^/]+/.test(path)) return "知乎问题";
    if ((host === "www.zhihu.com" || host === "zhihu.com") && /^\/market\/paid_column\/[^/]+\/section\/[^/]+/.test(path)) return "知乎知识内容";
  } catch {
    return null;
  }
  return null;
}

function detectStartInput(input, text) {
  const trimmedInput = input.trim();
  const trimmedText = text.trim();
  const zhihuType = parseZhihuUrl(trimmedInput);

  if (zhihuType) return { ok: true, label: zhihuType, mode: "zhihu" };

  if (trimmedInput) {
    try {
      const url = new URL(trimmedInput);
      return { ok: true, label: `${url.hostname.replace(/^www\./, "")} 文章链接`, mode: "external" };
    } catch {
      if (trimmedText.length >= 20) return { ok: true, label: "粘贴文本片段", mode: "text" };
      return { ok: false, label: "链接暂时无法解析，可以粘贴标题、摘要或正文片段。" };
    }
  }

  if (trimmedText.length >= 20) return { ok: true, label: "粘贴文本片段", mode: "text" };
  return { ok: false, label: "可以输入任意文章链接，或直接粘贴一段文章内容。" };
}

function update(partial) {
  const previousView = state.view;
  Object.assign(state, partial);
  if (partial.loading === "") {
    if (loadingTimer) clearInterval(loadingTimer);
    loadingTimer = null;
    state.loadingStartedAt = null;
  }
  render();
  if ((partial.view && partial.view !== previousView) || Object.prototype.hasOwnProperty.call(partial, "currentIndex")) {
    window.scrollTo({ top: 0, left: 0 });
  }
}

function navigate(view) {
  update({ view, selectedDirection: null, selectedCandidate: null, activeBook: null });
}

async function startAdventure(event) {
  event?.preventDefault();
  const detection = detectStartInput(state.inputUrl, state.articleText);
  if (!detection.ok) {
    update({ selectedDirection: detection.label });
    return;
  }
  try {
    setBusy("AI 正在理解你的起点文章...");
    const data = await apiPost("/api/start", {
      url: state.inputUrl,
      text: state.articleText,
    });
    const step = firstStepFromStart(data);
    step.directions = data.directions || [];
    Object.assign(state, {
      view: "adventure",
      currentIndex: 0,
      route: [step],
      selectedDirection: null,
      selectedCandidate: null,
      candidates: [],
      interestProfile: data.interestProfile || {},
      finished: false,
      activeBook: null,
      useDemo: false,
      loading: "",
      loadingStartedAt: null,
      error: "",
    });
    render();
  } catch (error) {
    setError(error);
  }
}

function startDemoAdventure() {

async function chooseDirection(direction) {
  if (state.useDemo) {
    const nextStep = adventure.steps[state.currentIndex + 1];
    const candidates = candidateOptions(nextStep);
    update({ selectedDirection: direction, selectedCandidate: candidates[0] || null, candidates });
    return;
  }

  try {
    Object.assign(state, {
      selectedDirection: direction,
      selectedCandidate: null,
      candidates: [],
      loading: "正在搜索并筛选候选内容...",
      loadingStartedAt: Date.now(),
      error: "",
    });
    render();
    const data = await apiPost("/api/candidates", {
      currentStep: state.route[state.currentIndex],
      direction,
      route: state.route,
      interestProfile: state.interestProfile,
    });
    update({
      candidates: data.candidates,
      selectedCandidate: data.candidates?.[0] || null,
      loading: "",
      loadingStartedAt: null,
      error: "",
    });
  } catch (error) {
    setError(error);
  }
}

function chooseCandidate(candidate) {
  update({ selectedCandidate: candidate });
}

function closeCandidateModal() {
  update({ candidates: [], selectedCandidate: null, selectedDirection: null });
}

async function goNext() {
  if (state.useDemo) {
    const nextIndex = Math.min(state.currentIndex + 1, adventure.steps.length - 1);
    update({
      currentIndex: nextIndex,
      route: adventure.steps.slice(0, nextIndex + 1),
      selectedDirection: null,
      selectedCandidate: null,
      candidates: [],
      finished: nextIndex === adventure.steps.length - 1,
    });
    return;
  }

  if (!state.selectedCandidate) return;

  try {
    const selectedCandidate = state.selectedCandidate;
    Object.assign(state, {
      selectedDirection: null,
      selectedCandidate: null,
      candidates: [],
      loading: "正在生成章节导读、衔接关系和下一章方向...",
      loadingStartedAt: Date.now(),
      error: "",
    });
    render();
    const data = await apiPost("/api/choose", {
      previousStep: state.route[state.currentIndex],
      candidate: selectedCandidate,
      route: state.route,
      interestProfile: state.interestProfile,
    });
    const nextRoute = [...state.route, data.step];
    const nextIndex = nextRoute.length - 1;

    if (data.directions?.length) {
      nextRoute[nextIndex].directions = data.directions;
    }

    Object.assign(state, {
      currentIndex: nextIndex,
      route: nextRoute,
      selectedDirection: null,
      selectedCandidate: null,
      candidates: [],
      interestProfile: data.interestProfile || state.interestProfile,
      finished: nextRoute.length >= 10,
      loading: "",
      loadingStartedAt: null,
      error: "",
    });
    render();
    window.scrollTo({ top: 0, left: 0 });

    if (!state.finished && !data.directions?.length) {
      setBusy("AI 正在生成下一章方向...");
      await refreshDirections(data.step);
    }
  } catch (error) {
    setError(error);
  }
}

async function finishBook() {
  if (state.useDemo) {
    const book = saveCurrentBook();
    update({ view: "book", activeBook: book, finished: "book" });
    return;
  }

  try {
    setBusy("正在装订你的非书...");
    const localBook = makeBook();

    const existing = readLibrary();
    writeLibrary([localBook, ...existing.filter((item) => item.id !== localBook.id)].slice(0, 12));
    update({ view: "book", activeBook: localBook, finished: "book", loading: "", loadingStartedAt: null, error: "" });

    Promise.allSettled([
      apiPost("/api/book", {
        route: state.route,
        interestProfile: state.interestProfile,
      }),
      apiPost("/api/cover", { book: localBook }),
    ]).then(([bookResult, coverResult]) => {
      let book = { ...localBook };
      if (bookResult.status === "fulfilled") {
        const b = bookResult.value.book || {};
        book = {
          ...book,
          title: b.title || book.title,
          subtitle: b.subtitle || book.subtitle,
          preface: b.preface || book.preface,
          tags: Array.isArray(b.tags) ? b.tags : book.tags,
          style: b.style || book.style,
          explorationSummary: b.explorationSummary || book.explorationSummary,
          sourceAuthors: Array.isArray(b.sourceAuthors) ? b.sourceAuthors : book.sourceAuthors,
          steps: state.route,
        };
      } else {
        console.error("Book API failed:", bookResult.reason);
      }

      if (coverResult.status === "fulfilled" && coverResult.value.coverConcept) {
        const cd = coverResult.value.coverConcept;
        book.coverConcept = cd.composition || cd.imagePrompt || "";
        book.coverData = cd;
        book.cover = cd.cssTheme || "music";
      } else if (coverResult.status === "rejected") {
        console.error("Cover API failed:", coverResult.reason);
      }

      const lib = readLibrary();
      writeLibrary([book, ...lib.filter((item) => item.id !== book.id)].slice(0, 12));

      if (state.activeBook?.id === localBook.id) {
        update({ activeBook: book });
      }
    });
  } catch (error) {
    setError(error);
  }
}

                ${state.hotListLoading ? "刷新中..." : "刷新"}

            </div>
            ${state.hotListError ? `<div class="hotlist-error">${state.hotListError}</div>` : ""}

  bindNav();
  document.querySelector("#url-input").addEventListener("input", (event) => {
    state.inputUrl = event.target.value;
    render();
  });
  document.querySelector("#article-input").addEventListener("input", (event) => {
    state.articleText = event.target.value;
  });
  document.querySelector("#start-form").addEventListener("submit", startAdventure);
  document.querySelector("#demo-route-button").addEventListener("click", startDemoAdventure);
  document.querySelector("#refresh-hotlist")?.addEventListener("click", () => fetchHotList(true));
  document.querySelectorAll(".featured-card").forEach((card) => {
    card.addEventListener("click", () => {

      const item = state.hotList[index];
      if (item?.url) {
        state.inputUrl = item.url;
        startAdventure();
      }

  });
}

}

function directionTitle(direction) {
  if (!direction) return "";
  return typeof direction === "string" ? direction : direction.label || direction.text || "";
}

function directionText(direction) {
  if (!direction) return "";
  return typeof direction === "string" ? direction : direction.text || direction.label || "";
}

function candidateTitle(candidate) {
  return candidate.curatedTitle || candidate.title || "未命名章节";
}

function candidateSignals(candidate) {
  const signals = candidate.trustSignals?.length
    ? candidate.trustSignals
    : [
        candidate.sourceLabel || candidate.source || "资料来源",
        candidate.author ? `作者 ${candidate.author}` : "",
        candidate.voteUpCount ? `${candidate.voteUpCount} 赞同` : "",
        candidate.commentCount ? `${candidate.commentCount} 评论` : "",
      ].filter(Boolean);
  return signals.slice(0, 6).map((signal) => `<span>${signal}</span>`).join("");
}

function candidateTags(candidate) {
  const tags = candidate.fitTags?.length ? candidate.fitTags : candidate.concepts || [];
  return tags.slice(0, 3).map((tag) => `<span>${tag}</span>`).join("");
}

function renderCandidateModal(candidates, selectedDirectionText) {

          <p>你选择了「${selectedDirectionText}」。下面 3 章都能接住当前内容，但会把这本非书带向不同的阅读重点。</p>

          ${candidates

                  <div class="signal-row">${candidateSignals(candidate)}</div>

                  <p><b>读完能获得什么：</b>${candidate.readerGain || candidate.summary || "你会获得一个更清楚的理解入口，帮助判断这条线索是否值得继续。"}</p>
                  <div class="choice-footer">
                    <div class="tag-row compact">${candidateTags(candidate)}</div>

  `;
  bindNav();
  document.querySelector("#new-book-button")?.addEventListener("click", () => navigate("start"));
  document.querySelectorAll(".shelf-card").forEach((card) => {
    card.addEventListener("click", () => {
      const book = visibleBooks.find((item) => item.id === card.dataset.book);

function render() {
  if (state.view === "landing") renderLanding();
  else if (state.view === "start") renderStart();
  else if (state.view === "library") renderLibrary();
  else if (state.view === "book") renderBook();
  else renderAdventure();
}

function handleUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const urlParam = params.get("url");
  const textParam = params.get("text");

  if (urlParam) {
    state.inputUrl = urlParam;
    startAdventure();
    return true;
  }
  if (textParam) {
    state.articleText = textParam;
    startAdventure();
    return true;
  }
  return false;
}

if (!handleUrlParams()) {
  render();
}
